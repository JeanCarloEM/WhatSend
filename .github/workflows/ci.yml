name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate release notes policy
        run: node scripts/validate-release-notes-policy.js --github

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run RCF check with fixtures
        run: npm run check:test

      - name: Build distributable dist
        run: npm run build:dist

      - name: Validate distributable dist
        run: npm run validate:dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatSend-dist
          path: dist/
          if-no-files-found: error
